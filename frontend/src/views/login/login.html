<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - DigiAduana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../public/css/auth.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-card text-center">
        <a href="../home/index.html" class="auth-logo">
            <i class="bi bi-box-seam text-primary"></i>
            <span>DigiAduana</span>
        </a>
        
        <h4 class="fw-bold mb-1">¡Bienvenido de nuevo!</h4>
        <p class="text-muted small mb-4">Accede para gestionar tus expedientes aduaneros</p>

        <form>
            <div class="col-md-12 mb-3 text-start">
                <label class="form-label small fw-bold">Correo Electrónico</label>
                <input type="email" class="form-control" placeholder="ejemplo@correo.com" required>
            </div>
            
            <div class="mb-3 text-start">
                <div class="d-flex justify-content-between">
                    <label class="form-label small fw-bold">Contraseña</label>
                    <a href="#" class="small text-decoration-none" style="color: #666;">¿La olvidaste?</a>
                </div>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="mb-4 text-start">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label small" for="remember">Recordar sesión</label>
                </div>
            </div>
            <a href="../home/index.html"><button type="submit" class="btn btn-auth shadow-sm">INICIAR SESIÓN</button></a>
        </form>

        <div class="auth-footer">
            ¿No tienes cuenta? <a href="../registro/registro.html">Regístrate aquí</a>
        </div>
    </div>
</div>

</body>
</html>
