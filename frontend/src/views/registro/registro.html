<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - DigiAduana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../public/css/auth.css">
</head>
<body>

<div class="auth-container" style="max-width: 500px;">
    <div class="auth-card">
        <a href="../home/index.html" class="auth-logo">
            <i class="bi bi-box-seam text-primary"></i>
            <span>DigiAduana</span>
        </a>
        
        <h4 class="fw-bold text-center mb-1">Crea tu cuenta corporativa</h4>
        <p class="text-muted small text-center mb-4">Únete a la plataforma líder en gestión aduanera</p>

        <form>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold">Nombres</label>
                    <input type="text" class="form-control" placeholder="Juan" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold">Apellidos</label>
                    <input type="text" class="form-control" placeholder="Pérez" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold">Correo Electrónico</label>
                <input type="email" class="form-control" placeholder="juan.perez@empresa.com" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label small fw-bold">Contraseña</label>
                <input type="password" class="form-control" placeholder="Mínimo 8 caracteres" required>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold">Confirmar Contraseña</label>
                <input type="password" class="form-control" placeholder="Mínimo 8 caracteres" required>
            </div>

            <button type="submit" class="btn btn-auth shadow-sm">CREAR CUENTA</button>
        </form>

        <div class="auth-footer">
            ¿Ya tienes una cuenta? <a href="../login/login.html">Inicia sesión</a>
        </div>
    </div>
</div>

</body>
</html>
