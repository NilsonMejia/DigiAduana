<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DigiAduana - Gestión de Expedientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../public/css/expedientes.css">
</head>
<body>

    <!-- Barra Lateral de Navegación -->
    <div class="sidebar d-flex flex-column p-3">
        <div class="text-center mb-4"><h4>DigiAduana</h4></div>
        <nav class="nav flex-column">
            <a class="nav-link" href="../dashboard/index.html"><i class="bi bi-grid-1x2-fill me-2"></i> Dashboard</a>
            <a class="nav-link active" href="#"><i class="bi bi-folder-fill me-2"></i> Expedientes</a>
            <a class="nav-link" href="../fiscal/dte.html"><i class="bi bi-file-earmark-text me-2"></i> Facturación DTE</a>
        </nav>
    </div>

    <!-- Contenido Principal -->
    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Gestión de Expedientes</h2>
            <div class="input-group w-25">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control border-start-0" placeholder="Buscar expediente...">
            </div>
        </div>

        <!-- Tabla de Expedientes con Detalles Esenciales -->
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID Expediente</th>
                            <th>Cliente</th>
                            <th>Fecha Registro</th>
                            <th>Tipo Carga</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><strong>EXP-2026-001</strong></td>
                            <td>Importadora El Sol</td>
                            <td>28/04/2026</td>
                            <td><span class="badge bg-info text-dark">Aéreo</span></td>
                            <td><span class="badge bg-warning text-dark">En Revisión</span></td>
                            <td><button class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i> Detalle</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
