<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DigiAduana - Facturación DTE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../public/css/dte.css">
</head>
<body>
    <div class="sidebar d-flex flex-column p-3">
        <div class="text-center mb-4"><h4>DigiAduana</h4></div>
        <nav class="nav flex-column">
            <a class="nav-link" href="../dashboard/index.html"><i class="bi bi-grid-1x2-fill me-2"></i> Dashboard</a>
            <a class="nav-link" href="../operaciones/expedientes.html"><i class="bi bi-folder-fill me-2"></i> Expedientes</a>
            <a class="nav-link active" href="#"><i class="bi bi-file-earmark-text me-2"></i> Facturación DTE</a>
        </nav>
    </div>
    <main class="main-content">
        <h2 class="mb-4">Portal Tributario (DTE Hacienda)</h2>
        <div class="row g-4">

            <!-- Formulario de Emisión de DTE -->
            <div class="col-md-8">
                <div class="card p-4 border-0 shadow-sm">
                    <h5 class="mb-4 text-primary"><i class="bi bi-plus-circle me-2"></i>Emitir Documento Tributario</h5>

                    <!-- Formulario para Emisión de DTE con Campos Esenciales -->
                    <form>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Tipo de DTE</label>
                                <select class="form-select"><option>Factura de Exportación</option><option>Crédito Fiscal</option></select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Número de Control MH</label>
                                <input type="text" class="form-control" placeholder="Generado automáticamente" disabled>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Concepto / Descripción del Trámite</label>
                            <textarea class="form-control" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-success px-4 py-2"><i class="bi bi-send-check me-2"></i>Firmar y Enviar a Hacienda</button>
                    </form>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-primary text-white p-4 border-0 shadow-sm h-100">
                    <h6>DTEs Procesados Hoy</h6>
                    <h2 class="display-5 fw-bold">24</h2>
                    <hr>
                    <p class="small">Sincronización con el Ministerio de Hacienda: <span class="text-info fw-bold">Activa</span></p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
